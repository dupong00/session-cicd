# 로드밸런서(리버스 프록시) 설정.
# app-1, app-2 두 인스턴스에 요청을 번갈아(라운드로빈) 분배한다.

upstream app_servers {
    # 기본 분배 방식 = 라운드로빈 (요청마다 app-1 → app-2 → app-1 ...)
    # 일부러 sticky(고정) 안 건다 → 세션이 인스턴스 메모리에 있으면 실패하는 걸 재현하려고
    server app-1:8080;
    server app-2:8080;
}

server {
    listen 80;

    location / {
        proxy_pass http://app_servers;

        # 뒤쪽 앱이 원래 요청 정보를 알 수 있게 헤더 전달
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: JDK 25 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: gradlew 실행권한
        run: chmod +x gradlew
      
      - name: 빌드 테스트
        run: ./gradlew build
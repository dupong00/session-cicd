# Phase 2 - Redis 구성: 앱 2대 + nginx + redis
# 세션을 각 앱 메모리가 아니라 공유 Redis에 저장 → 어느 앱으로 가도 로그인 유지.

services:
  # 세션의 유일한 저장소. 모든 앱이 여기를 공유한다.
  redis:
    image: redis:7-alpine
    # ports 매핑을 일부러 하지 않는다 → 호스트/외부로 6379 노출 안 됨 (보안).
    # 컨테이너 네트워크 안에서 app-1/app-2만 'redis'라는 이름으로 접근.

  # 앱 인스턴스 1 — 같은 Dockerfile로 빌드, INSTANCE_ID만 다르게
  app-1:
    build: .
    environment:
      - INSTANCE_ID=app-1   # 응답의 instanceId로 어느 앱이 처리했는지 구분
      - REDIS_HOST=redis    # 세션을 저장할 Redis 위치 (compose 서비스명)
    expose:
      - "8080"              # 컨테이너 네트워크 안에서만 열림 (호스트로는 노출 X)
    depends_on:
      - redis               # redis 먼저 뜨고 나서 앱 기동
    # 8080 포트가 실제로 열렸는지 컨테이너 안에서 확인 (bash의 /dev/tcp 기능, 설치 불필요)
    healthcheck:
      test: ["CMD", "bash", "-c", ": > /dev/tcp/127.0.0.1/8080"]
      interval: 3s          # 3초마다 검사
      timeout: 3s
      retries: 20           # 20번 실패하면 unhealthy
      start_period: 15s     # 기동 유예 - 이 동안 실패해도 재시도 횟수에 안 넣음

  # 앱 인스턴스 2
  app-2:
    build: .
    environment:
      - INSTANCE_ID=app-2
      - REDIS_HOST=redis
    expose:
      - "8080"
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "bash", "-c", ": > /dev/tcp/127.0.0.1/8080"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 15s

  # 로드밸런서 — 외부(호스트 8080)를 받아서 app-1/app-2로 분배
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"           # 호스트 8080 → nginx 80
    volumes:
      # 우리가 만든 설정을 nginx 기본 설정 자리에 얹는다 (ro = 읽기전용)
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # 앱이 healthy 해진 뒤에 nginx 기동.
    # 안 그러면 nginx가 기동 중인 앱에 요청을 보냈다가 실패로 간주하고
    # fail_timeout 동안 upstream을 차단해버려서 502가 난다.
    depends_on:
      app-1:
        condition: service_healthy
      app-2:
        condition: service_healthy

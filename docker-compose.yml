# Phase 2 - Redis 구성: 앱 2대 + nginx + redis
# 세션을 각 앱 메모리가 아니라 공유 Redis에 저장 → 어느 앱으로 가도 로그인 유지.

services:
  # 세션의 유일한 저장소. 모든 앱이 여기를 공유한다.
  redis:
    image: redis:7-alpine
    # ports 매핑을 일부러 하지 않는다 → 호스트/외부로 6379 노출 안 됨 (보안).
    # 컨테이너 네트워크 안에서 app-1/app-2만 'redis'라는 이름으로 접근.

  # 앱 인스턴스 1 — 같은 Dockerfile로 빌드, INSTANCE_ID만 다르게
  app-1:
    build: .
    environment:
      - INSTANCE_ID=app-1   # 응답의 instanceId로 어느 앱이 처리했는지 구분
      - REDIS_HOST=redis    # 세션을 저장할 Redis 위치 (compose 서비스명)
    expose:
      - "8080"              # 컨테이너 네트워크 안에서만 열림 (호스트로는 노출 X)
    depends_on:
      - redis               # redis 먼저 뜨고 나서 앱 기동

  # 앱 인스턴스 2
  app-2:
    build: .
    environment:
      - INSTANCE_ID=app-2
      - REDIS_HOST=redis
    expose:
      - "8080"
    depends_on:
      - redis

  # 로드밸런서 — 외부(호스트 8080)를 받아서 app-1/app-2로 분배
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"           # 호스트 8080 → nginx 80
    volumes:
      # 우리가 만든 설정을 nginx 기본 설정 자리에 얹는다 (ro = 읽기전용)
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app-1
      - app-2

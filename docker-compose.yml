# Phase 2 - 실패 재현용 구성: 앱 2대 + nginx (아직 Redis 없음)
# 세션이 각 앱의 메모리에 있어서, 라운드로빈으로 다른 앱에 가면 세션을 못 찾는 걸 확인한다.

services:
  # 앱 인스턴스 1 — 같은 Dockerfile로 빌드, INSTANCE_ID만 다르게
  app-1:
    build: .
    environment:
      - INSTANCE_ID=app-1   # 응답의 instanceId로 어느 앱이 처리했는지 구분
    expose:
      - "8080"              # 컨테이너 네트워크 안에서만 열림 (호스트로는 노출 X)

  # 앱 인스턴스 2
  app-2:
    build: .
    environment:
      - INSTANCE_ID=app-2
    expose:
      - "8080"

  # 로드밸런서 — 외부(호스트 8080)를 받아서 app-1/app-2로 분배
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"           # 호스트 8080 → nginx 80
    volumes:
      # 우리가 만든 설정을 nginx 기본 설정 자리에 얹는다 (ro = 읽기전용)
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app-1
      - app-2
